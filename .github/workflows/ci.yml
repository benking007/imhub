name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any prior run on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck (src + test)
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
        env:
          LOG_LEVEL: error
